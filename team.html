<!DOCTYPE html>
<html>
<head>
    <title>Rescuer Team Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 120px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Rescuer Team Form</h2>
<hr>

<div class="form-row">
    <label>Team Name:</label>
    <!-- 🔥 placeholder + maxlength -->
    <input type="text" id="teamName" disabled 
           placeholder="Enter team name"
           maxlength="50">
</div>

<div class="form-row">
    <label>Leader:</label>
    <select id="leaderId" disabled></select>
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Team Name</th>
    <th>Leader (Skill)</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD RESCUERS DROPDOWN */
async function loadRescuers() {
    let res = await fetch('http://localhost:3000/getRescuers');
    let rescuers = await res.json();

    leaderId.innerHTML = "";

    rescuers.forEach(r => {
        leaderId.innerHTML += `<option value="${r.rescuerId}">
            ${r.skillSet}
        </option>`;
    });
}

/* LOAD DATA */
async function loadData() {
    let res = await fetch('http://localhost:3000/getTeams');
    data = await res.json();
    displayGrid();
}

/* DISPLAY */
function displayGrid() {
    let rows = '';
    data.forEach((d,i) => {
        rows += `<tr onclick="selectRow(${i})">
            <td>${d.teamId}</td>
            <td>${d.teamName}</td>
            <td>${d.leaderName}</td>
        </tr>`;
    });
    grid.innerHTML = rows;
}

/* SELECT */
function selectRow(i){
    currentIndex = i;
    show();
}

/* SHOW */
function show(){
    let d = data[currentIndex];
    teamName.value = d.teamName;
    leaderId.value = d.leaderId;
}

/* ENABLE */
function enable(){
    teamName.disabled = false;
    leaderId.disabled = false;
}

/* DISABLE */
function disable(){
    teamName.disabled = true;
    leaderId.disabled = true;
}

/* ADD */
function addNew(){
    teamName.value = "";
    leaderId.value = "";
    enable();
    mode = "add";
}

/* SAVE */
async function save(){
    let name = teamName.value.trim();
    let leader = leaderId.value;

    // 🔥 VALIDATION
    if (name === "") {
        alert("Team name is required");
        return;
    }

    if (name.length > 50) {
        alert("Team name max length is 50");
        return;
    }

    if (leader === "") {
        alert("Please select a leader");
        return;
    }

    if(mode==="add"){
        let res = await fetch('http://localhost:3000/addTeam',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({teamName:name, leaderId:leader})
        });

        alert(await res.text());
    }

    if(mode==="edit"){
        let id = data[currentIndex].teamId;

        let res = await fetch(`http://localhost:3000/updateTeam/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({teamName:name, leaderId:leader})
        });

        alert(await res.text());
    }

    loadData();
    disable();
}

/* EDIT */
function edit(){
    if(currentIndex >= 0){
        enable();
        mode="edit";
    }
}

/* DELETE */
async function deleteData(){
    let id = data[currentIndex].teamId;

    let res = await fetch(`http://localhost:3000/deleteTeam/${id}`,{
        method:'DELETE'
    });

    alert(await res.text());
    loadData();
}

/* NAVIGATION */
function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        show();
    }
}

function previous(){
    if(currentIndex > 0){
        currentIndex--;
        show();
    }
}

/* INIT */
loadRescuers();
loadData();
</script>

</body>
</html>
