<!DOCTYPE html>
<html>
<head>
    <title>SOS Request Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 120px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>SOS Request Form</h2>
<hr>

<div class="form-row">
    <label>Victim:</label>
    <select id="victimId" disabled></select>
</div>

<div class="form-row">
    <label>Disaster:</label>
    <select id="disasterId" disabled></select>
</div>

<div class="form-row">
    <label>Location:</label>
    <select id="locId" disabled></select>
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Victim Name</th>
    <th>Disaster</th>
    <th>Location</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD DROPDOWNS */
async function loadDropdowns() {

    let v = await fetch('http://localhost:3000/getVictims');
    let victims = await v.json();
    victimId.innerHTML = `<option value="">-- Select Victim --</option>`;
    victims.forEach(x => {
        victimId.innerHTML += `<option value="${x.victimId}">
            ${x.userName}
        </option>`;
    });

    let d = await fetch('http://localhost:3000/getDisasters');
    let disasters = await d.json();
    disasterId.innerHTML = `<option value="">-- Select Disaster --</option>`;
    disasters.forEach(x => {
        disasterId.innerHTML += `<option value="${x.disasterId}">
            ${x.type}
        </option>`;
    });

    let l = await fetch('http://localhost:3000/getLocations');
    let locations = await l.json();
    locId.innerHTML = `<option value="">-- Select Location --</option>`;
    locations.forEach(x => {
        locId.innerHTML += `<option value="${x.locId}">
            ${x.area}
        </option>`;
    });
}

/* LOAD DATA */
async function loadData() {
    let res = await fetch('http://localhost:3000/getRequests');
    data = await res.json();
    displayGrid();
}

/* DISPLAY */
function displayGrid() {
    let rows = '';
    data.forEach((d,i) => {
        rows += `<tr onclick="selectRow(${i})">
            <td>${d.requestId}</td>
            <td>${d.victimName}</td>
            <td>${d.disasterType}</td>
            <td>${d.locationArea}</td>
        </tr>`;
    });
    grid.innerHTML = rows;
}

/* SELECT */
function selectRow(i){
    currentIndex = i;
    victimId.value = data[i].victimId;
    disasterId.value = data[i].disasterId;
    locId.value = data[i].locId;
}

/* ENABLE */
function enable(){
    victimId.disabled = false;
    disasterId.disabled = false;
    locId.disabled = false;
}

/* DISABLE */
function disable(){
    victimId.disabled = true;
    disasterId.disabled = true;
    locId.disabled = true;
}

/* ADD */
function addNew(){
    victimId.value = "";
    disasterId.value = "";
    locId.value = "";
    enable();
    mode = "add";
}

/* SAVE */
async function save(){
    let v = victimId.value;
    let d = disasterId.value;
    let l = locId.value;

    // 🔥 VALIDATION
    if (v === "") {
        alert("Please select a victim");
        return;
    }

    if (d === "") {
        alert("Please select a disaster");
        return;
    }

    if (l === "") {
        alert("Please select a location");
        return;
    }

    if(mode==="add"){
        let res = await fetch('http://localhost:3000/addSOS',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                victimId: v,
                disasterId: d,
                locId: l
            })
        });

        alert(await res.text());
    }

    if(mode==="edit"){
        let id = data[currentIndex].requestId;

        let res = await fetch(`http://localhost:3000/updateSOS/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                victimId: v,
                disasterId: d,
                locId: l
            })
        });

        alert(await res.text());
    }

    loadData();
    disable();
}

/* EDIT */
function edit(){
    if(currentIndex >= 0){
        enable();
        mode="edit";
    }
}

/* DELETE */
async function deleteData(){
    let id = data[currentIndex].requestId;

    let res = await fetch(`http://localhost:3000/deleteSOS/${id}`,{
        method:'DELETE'
    });

    alert(await res.text());
    loadData();
}

/* NAVIGATION */
function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        selectRow(currentIndex);
    }
}

function previous(){
    if(currentIndex > 0){
        currentIndex--;
        selectRow(currentIndex);
    }
}

/* INIT */
loadDropdowns();
loadData();
</script>

</body>
</html>
