<!DOCTYPE html>
<html>
<head>
    <title>Organization Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 150px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Organization Form</h2>
<hr>

<div class="form-row">
    <label>Organization Name:</label>
    <!-- 🔥 placeholder + maxlength -->
    <input type="text" id="orgName" disabled 
           placeholder="Enter organization name"
           maxlength="100">
</div>

<div class="form-row">
    <label>Budget:</label>
    <!-- 🔥 constraints -->
    <input type="number" id="budget" disabled 
           placeholder="Enter budget"
           min="0" max="1000000000">
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Organization Name</th>
    <th>Budget</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD DATA */
async function loadData() {
    let res = await fetch('http://localhost:3000/getOrganizations');
    data = await res.json();
    displayGrid();
}

/* DISPLAY */
function displayGrid() {
    let rows = '';
    data.forEach((d,i) => {
        rows += `<tr onclick="selectRow(${i})">
            <td>${d.orgId}</td>
            <td>${d.orgName}</td>
            <td>${d.budget}</td>
        </tr>`;
    });
    grid.innerHTML = rows;
}

/* SELECT */
function selectRow(i){
    currentIndex = i;
    show();
}

/* SHOW */
function show(){
    let d = data[currentIndex];
    orgName.value = d.orgName;
    budget.value = d.budget;
}

/* ENABLE */
function enable(){
    orgName.disabled = false;
    budget.disabled = false;
}

/* DISABLE */
function disable(){
    orgName.disabled = true;
    budget.disabled = true;
}

/* ADD */
function addNew(){
    orgName.value = "";
    budget.value = "";
    enable();
    mode = "add";
}

/* SAVE */
async function save(){
    let name = orgName.value.trim();
    let bud = budget.value;

    // 🔥 VALIDATION
    if (name === "") {
        alert("Organization name is required");
        return;
    }

    if (name.length > 100) {
        alert("Name max length is 100");
        return;
    }

    if (bud === "" || bud < 0) {
        alert("Enter valid budget");
        return;
    }

    if(mode==="add"){
        let res = await fetch('http://localhost:3000/addOrganization',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({orgName:name, budget:bud})
        });

        alert(await res.text());
    }

    if(mode==="edit"){
        let id = data[currentIndex].orgId;

        let res = await fetch(`http://localhost:3000/updateOrganization/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({orgName:name, budget:bud})
        });

        alert(await res.text());
    }

    loadData();
    disable();
}

/* EDIT */
function edit(){
    if(currentIndex >= 0){
        enable();
        mode="edit";
    }
}

/* DELETE */
async function deleteData(){
    let id = data[currentIndex].orgId;

    let res = await fetch(`http://localhost:3000/deleteOrganization/${id}`,{
        method:'DELETE'
    });

    alert(await res.text());
    loadData();
}

/* NAVIGATION */
function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        show();
    }
}

function previous(){
    if(currentIndex > 0){
        currentIndex--;
        show();
    }
}

/* INIT */
loadData();
</script>

</body>
</html>
