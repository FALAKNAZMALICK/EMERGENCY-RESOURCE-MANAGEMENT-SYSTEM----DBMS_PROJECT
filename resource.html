<!DOCTYPE html>
<html>
<head>
    <title>Resource Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 140px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Resource Form</h2>
<hr>

<div class="form-row">
    <label>Item Name:</label>
    <!-- 🔥 placeholder + maxlength -->
    <input type="text" id="itemName" disabled 
           placeholder="Enter item name"
           maxlength="100">
</div>

<div class="form-row">
    <label>Cost Per Unit:</label>
    <!-- 🔥 positive numbers only -->
    <input type="number" id="costPerUnit" disabled 
           placeholder="Enter cost"
           min="0" max="1000000">
</div>

<div class="form-row">
    <label>Quantity:</label>
    <!-- 🔥 positive integers -->
    <input type="number" id="totalQuantity" disabled 
           placeholder="Enter quantity"
           min="0" max="100000">
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Item</th>
    <th>Cost</th>
    <th>Quantity</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD */
async function loadData() {
    let res = await fetch('http://localhost:3000/getResources');
    data = await res.json();
    displayGrid();
}

function displayGrid() {
    let rows = '';
    data.forEach((d,i) => {
        rows += `<tr onclick="selectRow(${i})">
            <td>${d.resourceId}</td>
            <td>${d.itemName}</td>
            <td>${d.costPerUnit}</td>
            <td>${d.totalQuantity}</td>
        </tr>`;
    });
    grid.innerHTML = rows;
}

function selectRow(i){
    currentIndex = i;
    show();
}

function show(){
    let d = data[currentIndex];
    itemName.value = d.itemName;
    costPerUnit.value = d.costPerUnit;
    totalQuantity.value = d.totalQuantity;
}

function enable(){
    itemName.disabled = false;
    costPerUnit.disabled = false;
    totalQuantity.disabled = false;
}

function disable(){
    itemName.disabled = true;
    costPerUnit.disabled = true;
    totalQuantity.disabled = true;
}

function addNew(){
    itemName.value = "";
    costPerUnit.value = "";
    totalQuantity.value = "";
    enable();
    mode = "add";
}

async function save(){
    let itemNameVal = itemName.value.trim();
    let costVal = costPerUnit.value;
    let qtyVal = totalQuantity.value;

    // 🔥 VALIDATION
    if (itemNameVal === "") {
        alert("Item name is required");
        return;
    }

    if (itemNameVal.length > 100) {
        alert("Item name max length is 100");
        return;
    }

    if (costVal === "" || costVal < 0) {
        alert("Enter valid cost");
        return;
    }

    if (qtyVal === "" || qtyVal < 0) {
        alert("Enter valid quantity");
        return;
    }

    if(mode==="add"){
        let res = await fetch('http://localhost:3000/addResource',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                itemName: itemNameVal,
                costPerUnit: costVal,
                totalQuantity: qtyVal
            })
        });

        alert(await res.text());
    }

    if(mode==="edit"){
        let id = data[currentIndex].resourceId;

        let res = await fetch(`http://localhost:3000/updateResource/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                itemName: itemNameVal,
                costPerUnit: costVal,
                totalQuantity: qtyVal
            })
        });

        alert(await res.text());
    }

    loadData();
    disable();
}

function edit(){
    if(currentIndex >= 0){
        enable();
        mode="edit";
    }
}

async function deleteData(){
    let id = data[currentIndex].resourceId;

    let res = await fetch(`http://localhost:3000/deleteResource/${id}`,{
        method:'DELETE'
    });

    alert(await res.text());
    loadData();
}

function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        show();
    }
}

function previous(){
    if(currentIndex > 0){
        currentIndex--;
        show();
    }
}

loadData();
</script>

</body>
</html>
