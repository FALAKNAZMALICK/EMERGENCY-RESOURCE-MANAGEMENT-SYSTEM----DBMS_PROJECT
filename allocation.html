<!DOCTYPE html>
<html>
<head>
    <title>Resource Allocation Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 140px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Resource Allocation Form</h2>
<hr>

<div class="form-row">
    <label>SOS Request:</label>
    <select id="reqId" disabled></select>
</div>

<div class="form-row">
    <label>Rescuer:</label>
    <select id="rescuerId" disabled></select>
</div>

<div class="form-row">
    <label>Resource:</label>
    <select id="resId" disabled></select>
</div>

<div class="form-row">
    <label>Quantity:</label>
    <!-- 🔥 constraints -->
    <input type="number" id="qty" disabled 
           placeholder="Enter quantity"
           min="1" max="10000">
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Victim</th>
    <th>Rescuer</th>
    <th>Resource</th>
    <th>Qty</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD DROPDOWNS */
async function loadDropdowns() {

    let s = await fetch('http://localhost:3000/getRequests');
    let sos = await s.json();
    reqId.innerHTML = `<option value="">-- Select Request --</option>`;
    sos.forEach(x => {
        reqId.innerHTML += `<option value="${x.requestId}">
            ${x.victimName} - ${x.disasterType}
        </option>`;
    });

    let r = await fetch('http://localhost:3000/getRescuers');
    let rescuers = await r.json();
    rescuerId.innerHTML = `<option value="">-- Select Rescuer --</option>`;
    rescuers.forEach(x => {
        rescuerId.innerHTML += `<option value="${x.rescuerId}">
            ${x.skillSet}
        </option>`;
    });

    let re = await fetch('http://localhost:3000/getResources');
    let resources = await re.json();
    resId.innerHTML = `<option value="">-- Select Resource --</option>`;
    resources.forEach(x => {
        resId.innerHTML += `<option value="${x.resourceId}">
            ${x.itemName}
        </option>`;
    });
}

/* LOAD DATA */
async function loadData() {
    let res = await fetch('http://localhost:3000/getAllocations');
    data = await res.json();
    displayGrid();
}

/* DISPLAY */
function displayGrid() {
    let rows = '';
    data.forEach((d,i) => {
        rows += `<tr onclick="selectRow(${i})">
            <td>${d.allocationId}</td>
            <td>${d.victim}</td>
            <td>${d.skillSet}</td>
            <td>${d.itemName}</td>
            <td>${d.allocatedQty}</td>
        </tr>`;
    });
    grid.innerHTML = rows;
}

/* SELECT */
function selectRow(i){
    currentIndex = i;

    let d = data[i];
    reqId.value = d.reqId;
    rescuerId.value = d.rescuerId;
    resId.value = d.resId;
    qty.value = d.allocatedQty;
}

/* ENABLE */
function enable(){
    reqId.disabled = false;
    rescuerId.disabled = false;
    resId.disabled = false;
    qty.disabled = false;
}

/* DISABLE */
function disable(){
    reqId.disabled = true;
    rescuerId.disabled = true;
    resId.disabled = true;
    qty.disabled = true;
}

/* ADD */
function addNew(){
    reqId.value = "";
    rescuerId.value = "";
    resId.value = "";
    qty.value = "";
    enable();
    mode = "add";
}

/* SAVE */
async function save(){
    let req = reqId.value;
    let resc = rescuerId.value;
    let reso = resId.value;
    let quantity = qty.value;

    // 🔥 VALIDATION
    if (req === "") {
        alert("Select SOS request");
        return;
    }

    if (resc === "") {
        alert("Select rescuer");
        return;
    }

    if (reso === "") {
        alert("Select resource");
        return;
    }

    if (quantity === "" || quantity <= 0) {
        alert("Enter valid quantity");
        return;
    }

    if (quantity > 10000) {
        alert("Max quantity allowed is 10000");
        return;
    }

    if(mode==="add"){
        let res = await fetch('http://localhost:3000/addAllocation',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                reqId:req,
                rescuerId:resc,
                resId:reso,
                allocatedQty:quantity
            })
        });

        alert(await res.text());
    }

    if(mode==="edit"){
        let id = data[currentIndex].allocationId;

        let res = await fetch(`http://localhost:3000/updateAllocation/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                reqId:req,
                rescuerId:resc,
                resId:reso,
                allocatedQty:quantity
            })
        });

        alert(await res.text());
    }

    loadData();
    disable();
}

/* EDIT */
function edit(){
    if(currentIndex >= 0){
        enable();
        mode="edit";
    }
}

/* DELETE */
async function deleteData(){
    let id = data[currentIndex].allocationId;

    let res = await fetch(`http://localhost:3000/deleteAllocation/${id}`,{
        method:'DELETE'
    });

    alert(await res.text());
    loadData();
}

/* NAVIGATION */
function next(){
    if(currentIndex < data.length-1){
        currentIndex++;
        selectRow(currentIndex);
    }
}

function previous(){
    if(currentIndex > 0){
        currentIndex--;
        selectRow(currentIndex);
    }
}

/* INIT */
loadDropdowns();
loadData();
</script>

</body>
</html>
