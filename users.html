<!DOCTYPE html>
<html>
<head>
    <title>Users Form</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 110px;
            font-weight: 600;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Users Form</h2>
<hr>

<div class="form-row">
    <label>Name:</label>
    <!-- 🔥 maxlength added -->
    <input type="text" id="name" disabled placeholder="Enter your name" maxlength="50">
</div>

<div class="form-row">
    <label>Phone:</label>
    <!-- 🔥 only numbers + maxlength -->
    <input type="text" id="phone" disabled placeholder="Enter phone number"
           maxlength="15"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div>

<div class="buttons">
    <button onclick="addNew()">Add</button>
    <button onclick="save()">Save</button>
    <button onclick="edit()">Edit</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="previous()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<h3>Records</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
let data = [];
let currentIndex = -1;
let mode = "";

/* LOAD DATA */
async function loadData() {
    let res = await fetch('http://localhost:3000/getUsers');
    data = await res.json();
    displayGrid();

    if (data.length > 0) {
        currentIndex = 0;
        showRecord();
    }
}

/* DISPLAY GRID */
function displayGrid() {
    let rows = '';
    data.forEach((d, index) => {
        rows += `<tr onclick="selectRow(${index})">
            <td>${d.userId}</td>
            <td>${d.name}</td>
            <td>${d.phone}</td>
        </tr>`;
    });
    document.getElementById("grid").innerHTML = rows;
}

/* SELECT ROW */
function selectRow(index) {
    currentIndex = index;
    showRecord();
}

/* SHOW RECORD */
function showRecord() {
    let d = data[currentIndex];
    document.getElementById("name").value = d.name;
    document.getElementById("phone").value = d.phone;
}

/* ENABLE INPUTS */
function enableInputs() {
    document.getElementById("name").disabled = false;
    document.getElementById("phone").disabled = false;
}

/* DISABLE INPUTS */
function disableInputs() {
    document.getElementById("name").disabled = true;
    document.getElementById("phone").disabled = true;
}

/* ADD */
function addNew() {
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    enableInputs();
    mode = "add";
}

/* SAVE */
async function save() {
    let nameVal = document.getElementById("name").value.trim();
    let phoneVal = document.getElementById("phone").value.trim();

    // 🔥 VALIDATION ADDED
    if (nameVal === "") {
        alert("Name is required");
        return;
    }

    if (nameVal.length > 50) {
        alert("Name max length is 50");
        return;
    }

    if (phoneVal === "") {
        alert("Phone is required");
        return;
    }

    if (phoneVal.length > 15) {
        alert("Phone max length is 15 digits");
        return;
    }

    if (mode === "add") {
        let res = await fetch('http://localhost:3000/addUser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameVal, phone: phoneVal })
        });
        alert(await res.text());
    }

    if (mode === "edit") {
        let id = data[currentIndex].userId;

        let res = await fetch(`http://localhost:3000/updateUser/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nameVal, phone: phoneVal })
        });
        alert(await res.text());
    }

    loadData();
    disableInputs();
}

/* EDIT */
function edit() {
    if (currentIndex >= 0) {
        enableInputs();
        mode = "edit";
    }
}

/* DELETE */
async function deleteData() {
    let id = data[currentIndex].userId;

    let res = await fetch(`http://localhost:3000/deleteUser/${id}`, {
        method: 'DELETE'
    });

    alert(await res.text());
    loadData();
}

/* NEXT */
function next() {
    if (currentIndex < data.length - 1) {
        currentIndex++;
        showRecord();
    }
}

/* PREVIOUS */
function previous() {
    if (currentIndex > 0) {
        currentIndex--;
        showRecord();
    }
}

/* INIT */
loadData();
</script>

</body>
</html>
